<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180" role="img" aria-label="心の平穏">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a2f63"/>
      <stop offset="0.5" stop-color="#1a1d3a"/>
      <stop offset="1" stop-color="#0f1124"/>
    </linearGradient>
    <linearGradient id="moon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b9dff"/>
      <stop offset="1" stop-color="#6ad3c4"/>
    </linearGradient>
    <mask id="crescent">
      <rect width="180" height="180" fill="#000"/>
      <circle cx="90" cy="92" r="34" fill="#fff"/>
      <circle cx="105" cy="80" r="31" fill="#000"/>
    </mask>
  </defs>
  <!-- 背景塗りつきの正方形（角丸） -->
  <rect width="180" height="180" rx="40" fill="url(#sky)"/>
  <!-- 同心円（静かな波紋） -->
  <circle cx="90" cy="92" r="66" fill="none" stroke="#8b9dff" stroke-opacity="0.16" stroke-width="2"/>
  <circle cx="90" cy="92" r="52" fill="none" stroke="#6ad3c4" stroke-opacity="0.20" stroke-width="2"/>
  <!-- 三日月 -->
  <rect width="180" height="180" fill="url(#moon)" mask="url(#crescent)"/>
  <!-- 星 -->
  <circle cx="124" cy="56" r="3.4" fill="#eef0fb"/>
  <circle cx="138" cy="108" r="2.4" fill="#eef0fb" fill-opacity="0.85"/>
  <circle cx="58" cy="128" r="2.2" fill="#eef0fb" fill-opacity="0.7"/>
  <circle cx="48" cy="62" r="1.8" fill="#eef0fb" fill-opacity="0.6"/>
</svg>
