<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="心の平穏">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1d3a"/>
      <stop offset="1" stop-color="#0f1124"/>
    </linearGradient>
    <linearGradient id="moon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b9dff"/>
      <stop offset="1" stop-color="#6ad3c4"/>
    </linearGradient>
    <mask id="crescent">
      <rect width="64" height="64" fill="#000"/>
      <circle cx="32" cy="32" r="13" fill="#fff"/>
      <circle cx="38" cy="28" r="12" fill="#000"/>
    </mask>
  </defs>
  <circle cx="32" cy="32" r="31" fill="url(#sky)"/>
  <!-- 同心円（静かな波紋） -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#8b9dff" stroke-opacity="0.18" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="20.5" fill="none" stroke="#6ad3c4" stroke-opacity="0.22" stroke-width="1.5"/>
  <!-- 三日月 -->
  <rect width="64" height="64" fill="url(#moon)" mask="url(#crescent)"/>
  <!-- 小さな星 -->
  <circle cx="44" cy="20" r="1.6" fill="#eef0fb"/>
  <circle cx="48" cy="40" r="1.1" fill="#eef0fb" fill-opacity="0.8"/>
  <circle cx="22" cy="46" r="1" fill="#eef0fb" fill-opacity="0.7"/>
</svg>
